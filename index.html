<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJR Digital — Client Demos</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 0.5rem;
        }
        p {
            color: #777;
            margin-bottom: 2rem;
        }
        .demos {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
        }
        .demo-link {
            display: block;
            padding: 1rem 2rem;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
            transition: background 0.2s;
        }
        .demo-link:hover {
            background: #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>JJR Digital — Client Demos</h1>
        <p>Select a client demo below</p>
        <div class="demos">
            <a href="/awakening" class="demo-link">Awakening for Mind, Body and Soul</a>
            <a href="/smiths-landscapes" class="demo-link">Smiths Landscapes</a>
            <a href="/dlh-cleaning" class="demo-link">DLH Cleaning Co</a>
            <a href="/window-cleaner" class="demo-link">Window Cleaner</a>
        </div>
    </div>
</body>
</html>
